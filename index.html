<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thiệp 8/3 - Tôn vinh vẻ đẹp</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,500&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
</head>

<body>
    <canvas id="bg-canvas"></canvas>

    <!-- Hiệu ứng chuyển cảnh lãng mạn -->
    <div id="transition-overlay">
        <div class="transition-petals-ring">🌸</div>
        <div class="transition-heart">✿</div>
    </div>

    <!-- Bước 1: Upload -->
    <div id="step-1" class="screen active">
        <div class="glass-container">
            <div class="title-wrapper">
                <h1 class="main-title">Tháng 3 Rạng Rỡ</h1>
                <p class="sub-title">Cùng tạo một tấm thiệp thật xinh đẹp mang đậm dấu ấn của riêng bạn 🌸</p>
            </div>

            <div class="upload-wrapper" id="upload-wrapper">
                <label for="selfie-btn" class="btn-primary">
                    <span class="icon">📸</span> Chụp ảnh trực tiếp
                </label>
                <input type="file" id="selfie-btn" accept="image/*" capture="user">

                <label for="upload-btn" class="btn-secondary" style="margin-top: 15px;">
                    <span class="icon">🖼️</span> Chọn ảnh từ thư viện
                </label>
                <input type="file" id="upload-btn" accept="image/png, image/jpeg, image/jpg">
            </div>
        </div>
    </div>

    <!-- Bước 2: Căn chỉnh & Lựa chọn phong cách -->
    <div id="step-2" class="screen">
        <div class="glass-container main-container" style="max-width: 500px">
            <p class="carousel-title">Căn chỉnh ảnh & Lựa chọn phong cách</p>

            <div class="preview-area" id="preview-area-wrap">
                <img id="cropper-image" style="max-width: 100%; max-height: 100%; display: block;">
                <div id="drag-hint" class="drag-hint">
                    <span class="hint-icon">👆</span><br>
                    <span>Kéo để căn chỉnh ảnh</span>
                </div>
            </div>

            <div class="scroll-hint-wrap" id="frame-hint-wrap">
                <div class="frame-carousel" id="frame-carousel-scroll">
                    <div id="frame-list" class="frame-list"></div>
                </div>
                <div class="scroll-hint-arrow" aria-hidden="true">›</div>
            </div>

            <p class="carousel-title" style="margin-top: 8px; margin-bottom: 6px;">Hiệu ứng màu ảnh</p>
            <div class="scroll-hint-wrap" id="filter-hint-wrap">
                <div class="filter-carousel" id="filter-carousel-scroll">
                    <div class="filter-list" id="filter-list">
                        <button class="filter-btn active" data-filter="none">Gốc</button>
                        <button class="filter-btn" data-filter="brightness(1.15) contrast(1.05) saturate(1.2)">Sáng rạng
                            rỡ</button>
                        <button class="filter-btn" data-filter="sepia(0.4) saturate(1.2)">Xứ sở mộng mơ</button>
                        <button class="filter-btn" data-filter="grayscale(1) contrast(1.2)">Phim cổ điển</button>
                        <button class="filter-btn" data-filter="hue-rotate(-20deg) saturate(1.4) brightness(1.1)">Hồng
                            lãng mạn</button>
                        <button class="filter-btn" data-filter="contrast(1.2) saturate(1.4)">Sắc nét</button>
                    </div>
                </div>
                <div class="scroll-hint-arrow" aria-hidden="true">›</div>
            </div>

            <div class="action-buttons">
                <button id="generate-final-btn" class="btn-primary">
                    <span class="icon">✨</span> Hoàn thiện thiệp
                </button>
                <button id="cancel-btn" class="btn-secondary">
                    <span class="icon">↩️</span> Đổi ảnh
                </button>
            </div>
        </div>
    </div>

    <!-- Bước 3: Hoàn thành -->
    <div id="step-3" class="screen screen-result">
        <div class="result-header">
            <h2 class="result-title">Thiệp của bạn đã sẵn sàng 🌸</h2>
        </div>

        <div class="result-canvas-wrap">
            <canvas id="final-result-canvas"></canvas>
        </div>

        <div class="result-actions">
            <button id="download-btn" class="btn-primary">
                <span class="icon">⬇️</span> Lưu thiệp về máy
            </button>
            <button id="redo-btn" class="btn-secondary">
                <span class="icon">↩️</span> Tạo thiệp mới
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
